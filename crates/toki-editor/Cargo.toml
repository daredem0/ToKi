[package]
name = "toki-editor"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0"

[dependencies]
anyhow = "1.0.99"
toki-runtime = { path = "../toki-runtime" }
toki-core = { path = "../toki-core" }
glam = "0.30.5"
pollster = "0.4.0"
wgpu = "25.0.2"
winit = { version = "0.30.12", features = ["wayland", "wayland-dlopen", "wayland-csd-adwaita"] }
egui = "0.32"
egui-winit = "0.32"
egui-wgpu = "0.32"
tracing.workspace = true
tracing-subscriber.workspace = true
